name: 'ATP Quality Platform - E2E project'

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Permissions needed for Terraform Cloud and GitHub integration
permissions:
  contents: read

jobs:
  infrastructure:
    name: '1. Infrastructure (Terraform)'
    runs-on: ubuntu-latest
    env:
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
    outputs:
      boutique_url: ${{ steps.tf_output.outputs.boutique_url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ./.infrastructure
        run: terraform init

      - name: Terraform Plan
        working-directory: ./.infrastructure
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        working-directory: ./.infrastructure
        run: terraform apply -auto-approve -input=false

      - name: Capture Boutique URL
        id: tf_output
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        working-directory: ./.infrastructure
        run: echo "boutique_url=$(terraform output -raw boutique_public_url)" >> $GITHUB_OUTPUT

  health_check:
    name: '2. Health Check'
    needs: infrastructure
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      BOUTIQUE_URL: ${{ needs.infrastructure.outputs.boutique_url }}
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Export kubeconfig
        run: doctl kubernetes cluster kubeconfig save atp-quality-cluster

      - name: Patch gRPC probe timeouts
        run: |
          for svc in emailservice recommendationservice; do
            kubectl patch deployment $svc -n default --type='json' -p='[
              {"op": "replace", "path": "/spec/template/spec/containers/0/livenessProbe/initialDelaySeconds", "value": 10},
              {"op": "replace", "path": "/spec/template/spec/containers/0/livenessProbe/timeoutSeconds", "value": 5},
              {"op": "replace", "path": "/spec/template/spec/containers/0/readinessProbe/initialDelaySeconds", "value": 10},
              {"op": "replace", "path": "/spec/template/spec/containers/0/readinessProbe/timeoutSeconds", "value": 5}
            ]'
          done

      - name: Wait for app to be ready
        run: |
          echo "Polling $BOUTIQUE_URL..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BOUTIQUE_URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "App is ready."
              exit 0
            fi
            sleep 15
          done
          echo "App did not become ready in time."
          exit 1

  quality_gates:
    name: '3. Quality Gates'
    needs: [health_check, infrastructure]
    runs-on: ubuntu-latest
    env:
      BOUTIQUE_URL: ${{ needs.infrastructure.outputs.boutique_url }}
    steps:
      - name: Placeholder for Performance/E2E Tests
        run: echo "Running parallelized Playwright and K6 tests against $BOUTIQUE_URL"

  teardown:
    name: '4. Teardown Infrastructure'
    needs: quality_gates
    if: always()
    runs-on: ubuntu-latest
    env:
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ./.infrastructure
        run: terraform init

      - name: Wait 3 minutes before destroy
        run: sleep 180

      - name: Terraform Destroy
        working-directory: ./.infrastructure
        run: terraform destroy -auto-approve -input=false